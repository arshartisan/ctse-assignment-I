syntax = "proto3";
package staylike.rooms;

service RoomsService {
  rpc CreateListing(CreateListingReq) returns (ListingResp);
  rpc GetListing(IdReq) returns (ListingResp);
  rpc UpdateListing(UpdateListingReq) returns (ListingResp);
  rpc DeleteListing(DeleteListingReq) returns (GenericResp);
  rpc SearchListings(SearchReq) returns (SearchResp);
  rpc CheckAvailability(AvailabilityReq) returns (AvailabilityResp);
  rpc GetAvailability(IdReq) returns (GetAvailabilityResp);
  rpc BlockDates(BlockDatesReq) returns (GenericResp);
  rpc UnblockDates(UnblockDatesReq) returns (GenericResp);
  rpc GetRoomCount(Empty) returns (RoomCountResp);
  rpc HealthCheck(Empty) returns (HealthResp);

  // Admin RPCs
  rpc SuspendListing(IdReq) returns (ListingResp);
  rpc AdminDeleteListing(IdReq) returns (GenericResp);
  rpc AdminSearchListings(AdminSearchReq) returns (SearchResp);
  rpc GetListingsByHost(HostIdReq) returns (HostListingsResp);
}

message Empty {}

message IdReq { string id = 1; }

message CreateListingReq {
  string hostId = 1;
  string title = 2;
  string city = 3;
  string description = 4;
  double price = 5;
  int32 maxGuests = 6;
}

message UpdateListingReq {
  string id = 1;
  string hostId = 2;
  string title = 3;
  string city = 4;
  string description = 5;
  double price = 6;
  int32 maxGuests = 7;
}

message DeleteListingReq {
  string id = 1;
  string hostId = 2;
}

message ListingResp {
  string id = 1;
  string hostId = 2;
  string title = 3;
  string city = 4;
  string description = 5;
  double price = 6;
  int32 maxGuests = 7;
  repeated string images = 8;
  bool active = 9;
}

message SearchReq {
  string city = 1;
  string checkIn = 2;
  string checkOut = 3;
  int32 guests = 4;
  int32 page = 5;
  int32 limit = 6;
  double minPrice = 7;
  double maxPrice = 8;
}

message SearchResp {
  repeated ListingResp listings = 1;
  int32 total = 2;
}

message AvailabilityReq {
  string listingId = 1;
  string start = 2;
  string end = 3;
}

message AvailabilityResp { bool available = 1; }

message BlockedDateRange {
  string start = 1;
  string end = 2;
  string reservationId = 3;
}

message GetAvailabilityResp {
  repeated BlockedDateRange blockedDates = 1;
}

message BlockDatesReq {
  string listingId = 1;
  string start = 2;
  string end = 3;
  string reservationId = 4;
}

message UnblockDatesReq {
  string listingId = 1;
  string start = 2;
  string end = 3;
  string reservationId = 4;
}

message GenericResp {
  bool ok = 1;
  string message = 2;
}

message CityCount {
  string city = 1;
  int32 count = 2;
}

message RoomCountResp {
  int32 total = 1;
  repeated CityCount byCity = 2;
}

message HealthResp {
  string status = 1;
  string service = 2;
  string timestamp = 3;
}

// Admin messages
message AdminSearchReq {
  int32 page = 1;
  int32 limit = 2;
  string city = 3;
  string status = 4;
  string host = 5;
}

message HostIdReq { string hostId = 1; }

message HostListingsResp {
  repeated ListingResp listings = 1;
  int32 total = 2;
}

