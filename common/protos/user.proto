syntax = "proto3";
package staylike.user;

service UserService {
  rpc CreateUser(CreateUserReq) returns (UserResp);
  rpc GetUserByEmail(EmailReq) returns (UserResp);
  rpc GetUserById(IdReq) returns (UserResp);
  rpc ValidateUserRole(RoleReq) returns (ValidateRoleResp);
}

message CreateUserReq {
  string email = 1;
  string passwordHash = 2;
  string name = 3;
  string role = 4;
}

message EmailReq { string email = 1; }
message IdReq { string id = 1; }

message UserResp {
  string id = 1;
  string email = 2;
  string name = 3;
  string role = 4;
  bool active = 5;
}

message RoleReq { string id = 1; string role = 2; }
message ValidateRoleResp { bool ok = 1; string message = 2; }
